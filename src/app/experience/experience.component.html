<section class="experience-section section-padding animate-fade-up">
    <div class="text-center mb-5">
        <h2 class="section-title">Professional Journey</h2>
    </div>

    <div class="timeline-container">
        <div class="timeline-item" *ngFor="let exp of experiences">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <div class="exp-header d-flex flex-column flex-md-row justify-content-between mb-3">
                    <div>
                        <h3 class="exp-title">{{ exp.title }}</h3>
                        <p class="exp-company">{{ exp.company }} • {{ exp.location }}</p>
                    </div>
                    <span class="exp-duration">{{ exp.duration }}</span>
                </div>
                <ul class="exp-responsibilities">
                    <li *ngFor="let resp of exp.responsibilities">{{ resp }}</li>
                </ul>
            </div>
        </div>
    </div>
</section>
