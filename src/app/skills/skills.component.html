<section class="skills-section section-padding animate-fade-up">
    <div class="text-center mb-5">
        <h2 class="section-title">My Expertise</h2>
    </div>

    <div class="skills-container">
        <!-- Frontend -->
        <div class="skill-group mb-5">
            <h4 class="group-title mb-4">Frontend Development</h4>
            <div class="skills-flex">
                <div class="skill-pill" *ngFor="let skill of frontendSkills">
                    <img *ngIf="skill.icon" [src]="skill.icon" [alt]="skill.name" class="skill-icon">
                    <i *ngIf="skill.faIcon" [class]="skill.faIcon + ' skill-fa-icon'"></i>
                    <span>{{ skill.name }}</span>
                </div>
            </div>
        </div>

        <!-- Backend & DB -->
        <div class="skill-group mb-5">
            <h4 class="group-title mb-4">Backend & Database</h4>
            <div class="skills-flex">
                <div class="skill-pill" *ngFor="let skill of backendSkills">
                    <img *ngIf="skill.icon" [src]="skill.icon" [alt]="skill.name" class="skill-icon">
                    <i *ngIf="skill.faIcon" [class]="skill.faIcon + ' skill-fa-icon'"></i>
                    <span>{{ skill.name }}</span>
                </div>
                <div class="skill-pill" *ngFor="let skill of databaseSkills">
                    <img *ngIf="skill.icon" [src]="skill.icon" [alt]="skill.name" class="skill-icon">
                    <i *ngIf="skill.faIcon" [class]="skill.faIcon + ' skill-fa-icon'"></i>
                    <span>{{ skill.name }}</span>
                </div>
            </div>
        </div>

        <!-- Cloud & Infrastructure -->
        <div class="skill-group mb-5">
            <h4 class="group-title mb-4">Cloud & Infrastructure</h4>
            <div class="skills-flex">
                <div class="skill-pill" *ngFor="let skill of cloudSkills">
                    <img *ngIf="skill.icon" [src]="skill.icon" [alt]="skill.name" class="skill-icon">
                    <i *ngIf="skill.faIcon" [class]="skill.faIcon + ' skill-fa-icon'"></i>
                    <span>{{ skill.name }}</span>
                </div>
            </div>
        </div>

        <!-- AI & Machine Learning -->
        <div class="skill-group mb-5">
            <h4 class="group-title mb-4">AI & Machine Learning</h4>
            <div class="skills-flex">
                <div class="skill-pill" *ngFor="let skill of aiSkills">
                    <img *ngIf="skill.icon" [src]="skill.icon" [alt]="skill.name" class="skill-icon">
                    <i *ngIf="skill.faIcon" [class]="skill.faIcon + ' skill-fa-icon'"></i>
                    <span>{{ skill.name }}</span>
                </div>
            </div>
        </div>

        <!-- Tools -->
        <div class="skill-group">
            <h4 class="group-title mb-4">Tools & Others</h4>
            <div class="skills-flex">
                <div class="skill-pill" *ngFor="let skill of toolSkills">
                    <img *ngIf="skill.icon" [src]="skill.icon" [alt]="skill.name" class="skill-icon">
                    <i *ngIf="skill.faIcon" [class]="skill.faIcon + ' skill-fa-icon'"></i>
                    <span>{{ skill.name }}</span>
                </div>
            </div>
        </div>
    </div>
</section>
